<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Red stripe -->
  <rect width="900" height="200" fill="#CE1126"/>
  
  <!-- White stripe -->
  <rect y="200" width="900" height="200" fill="#FFFFFF"/>
  
  <!-- Black stripe -->
  <rect y="400" width="900" height="200" fill="#000000"/>
  
  <!-- Eagle emblem -->
  <g transform="translate(450, 300)">
    <!-- Shield background -->
    <path d="M -45 -30 L 45 -30 L 45 35 Q 0 55 -45 35 Z" fill="#FFD700" stroke="#B8860B" stroke-width="3"/>
    
    <!-- Eagle body -->
    <ellipse cx="0" cy="8" rx="28" ry="35" fill="#8B6914"/>
    
    <!-- Eagle wings -->
    <path d="M -28 0 Q -50 -15 -55 5 Q -50 10 -28 8" fill="#8B6914"/>
    <path d="M 28 0 Q 50 -15 55 5 Q 50 10 28 8" fill="#8B6914"/>
    
    <!-- Eagle head -->
    <ellipse cx="0" cy="-18" rx="12" ry="14" fill="#8B6914"/>
    <circle cx="4" cy="-20" r="3.5" fill="#000"/>
    
    <!-- Eagle beak -->
    <path d="M 5 -16 L 12 -14 L 5 -12 Z" fill="#FFD700"/>
    
    <!-- Shield border details -->
    <circle cx="-25" cy="20" r="4" fill="#B8860B"/>
    <circle cx="25" cy="20" r="4" fill="#B8860B"/>
  </g>
</svg>